name: Tauri Linux dependencies
description: >
  Install the GTK/WebKit dev packages the tauri-* example crates (Tauri 2.x)
  need to compile on Linux. The workspace has no default-members, so any
  `--workspace` build pulls these examples in transitively via glib-sys /
  webkit2gtk-4.1-sys.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libayatana-appindicator3-dev
