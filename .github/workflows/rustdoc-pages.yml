name: Publish Rust Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build rustdoc
        # Restrict to the framework crates under `crates/`. The workspace
        # also contains `examples/*` members; one of them (tauri-web's
        # src-tauri) transitively depends on glib-sys / webkit2gtk-sys
        # via Tauri's Linux backend, which would require us to install
        # GTK system packages on the Ubuntu runner. Example crates are
        # applications, not libraries — their rustdoc isn't useful on
        # the docs site, so we just skip them.
        run: |
          cargo doc --no-deps \
            -p cratestack \
            -p cratestack-axum \
            -p cratestack-cli \
            -p cratestack-client-dart \
            -p cratestack-client-flutter \
            -p cratestack-client-typescript \
            -p cratestack-client-store-redis \
            -p cratestack-client-rust \
            -p cratestack-client-store-sqlite \
            -p cratestack-codec-cbor \
            -p cratestack-codec-json \
            -p cratestack-core \
            -p cratestack-lsp \
            -p cratestack-macros \
            -p cratestack-parser \
            -p cratestack-policy \
            -p cratestack-redis \
            -p cratestack-rusqlite \
            -p cratestack-sql \
            -p cratestack-sqlx \
            -p cratestack-studio-generator

      - name: Prepare Pages content
        run: |
          touch target/doc/.nojekyll
          echo "rust-doc.cratestack.dev" > target/doc/CNAME
          if [ ! -f target/doc/index.html ]; then
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head>' \
              '  <meta charset="utf-8" />' \
              '  <meta http-equiv="refresh" content="0; url=./cratestack/" />' \
              '  <title>Rust Docs</title>' \
              '</head>' \
              '<body>' \
              '  <p>Redirecting to <a href="./cratestack/">cratestack docs</a>...</p>' \
              '</body>' \
              '</html>' \
              > target/doc/index.html
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
