name: Publish Rust Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Prepare Pages content
        run: |
          touch target/doc/.nojekyll
          echo "rust-doc.cratestack.dev" > target/doc/CNAME
          if [ ! -f target/doc/index.html ]; then
            cat > target/doc/index.html <<'HTML'
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./cratestack/" />
              <title>Rust Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="./cratestack/">cratestack docs</a>...</p>
            </body>
            </html>
            HTML
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
