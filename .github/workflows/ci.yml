name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Blocking gates --------------------------------------------------
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tauri-linux-deps
      - uses: dtolnay/rust-toolchain@stable
      - name: Assert Cargo.lock is up to date
        # Must run BEFORE rust-cache: that action invokes `cargo metadata`
        # without `--locked`, which would silently regenerate a stale
        # lockfile on the runner and mask the drift the `--locked` gate
        # below is meant to catch. This is the un-maskable assertion.
        run: cargo metadata --locked --format-version=1 > /dev/null
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: cargo check (workspace, all targets)
        # `--locked` also fails if the build itself would change the lock.
        run: just check --locked

  tests:
    name: tests (ephemeral Postgres)
    runs-on: ubuntu-latest
    env:
      # Turn a failed testcontainer/DB connection into a hard error
      # instead of a silent per-test skip — otherwise a broken Docker
      # runner would pass this gate green while skipping all PG coverage.
      CRATESTACK_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tauri-linux-deps
      # wasm32 (for the Studio UI build below) is installed by rustup from
      # rust-toolchain.toml's `targets`, for the pinned channel — adding it
      # to @stable here wouldn't apply to the pinned toolchain trunk uses.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,trunk
      # The `embed-ui` feature (default) embeds the Trunk-built Studio UI
      # via rust-embed, and cratestack-studio's api_smoke tests assert the
      # real index.html is served. The dist isn't checked in, so build it
      # here; cratestack-studio's build.rs picks up the sibling `dist/`.
      - name: Build Studio UI (Trunk)
        # `--locked` asserts the studio-ui's own (separate, tracked)
        # Cargo.lock is up to date — the root-workspace `--locked` flags
        # don't cover this excluded sub-workspace. rust-cache only touches
        # the root lock, so nothing masks this assertion.
        run: trunk build --locked
        working-directory: crates/cratestack-studio-ui
      - name: cargo test (testcontainers Postgres)
        # Retry up to 3x to absorb the known-flaky
        # `generated_routes_emit_tracing_events` (which intermittently
        # misses tracing events under workspace concurrency — same
        # rationale as the `release-check` recipe). A genuine regression
        # fails all three attempts and still blocks the PR. `--locked`
        # also asserts the committed Cargo.lock is up to date.
        run: |
          for attempt in 1 2 3; do
            echo "::group::test attempt $attempt/3"
            if just test-pg-tc --locked; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "attempt $attempt failed"
          done
          echo "tests failed after 3 attempts" >&2
          exit 1

  # ---- Embedded-isolation gate -----------------------------------------
  # Blocking. Builds the embedded (rusqlite) surface and its examples WITHOUT
  # any Postgres crate in the build graph. The `check` job above builds
  # `--workspace`, where Cargo unifies features across every member — and
  # `sqlx-postgres` pulls `rust_decimal` with its `std` feature, which the
  # embedded facade intentionally does not. That unification can make
  # embedded-only code compile on the workspace runner while failing for a
  # real embedded consumer (and via the example's own documented
  # `cargo run -p cratestack-sqlite --example …` command). Building these
  # packages in isolation reproduces the embedded consumer's feature set,
  # so the masking can't happen. (Regression guard: sqlite_offline_first,
  # which compiled under `--workspace` but not standalone.)
  embedded-examples:
    name: embedded examples (isolated build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Assert Cargo.lock is up to date
        run: cargo metadata --locked --format-version=1 > /dev/null
      - uses: Swatinem/rust-cache@v2
      - name: Build embedded facade + its examples in isolation
        # A single `-p cratestack-sqlite` (no other members) keeps Postgres
        # crates out of the graph, so rust_decimal resolves without `std` —
        # the exact config the examples must compile under.
        run: cargo build --locked -p cratestack-sqlite --examples
      - name: Build standalone embedded example crates in isolation
        run: |
          cargo build --locked \
            -p embedded-cli-example \
            -p embedded-daemon-example \
            -p embedded-webhook-example

  # ---- Lint gates ------------------------------------------------------
  # Blocking. Determinism comes from rust-toolchain.toml pinning the
  # version (and clippy/rustfmt components), so new stable lints/format
  # changes can't spontaneously turn these red between Rust releases —
  # bump the pin deliberately. `just lint` allows a small, documented set
  # of codegen-friendly lints (see the justfile).
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tauri-linux-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: cargo clippy -D warnings
        run: just lint

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: cargo fmt --check
        run: just fmt-check
