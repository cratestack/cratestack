services:
  postgres:
    image: postgres:18
    container_name: cratestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cratestack
      POSTGRES_PASSWORD: cratestack
      POSTGRES_DB: cratestack_test
    ports:
      - "55432:5432"
    volumes:
      # PG 18+ stores cluster data under a major-version subdirectory of
      # /var/lib/postgresql, so the mount lives one level above the legacy
      # /var/lib/postgresql/data path (docker-library/postgres#1259).
      - cratestack-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cratestack -d cratestack_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cratestack-postgres-data:
