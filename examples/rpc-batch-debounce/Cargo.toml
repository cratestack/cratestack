[package]
name = "rpc-batch-debounce-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Client-side debouncer that coalesces independent RPC calls into a single POST /rpc/batch. The pattern most offline-first UIs and rate-sensitive callers want — many awaitable .call() invocations, one wire round-trip."

[[bin]]
name = "rpc-batch-debounce-demo"
path = "src/main.rs"

[dependencies]
cratestack = { package = "cratestack-pg", path = "../../crates/cratestack-pg", version = "0.4.4" }
cratestack-codec-cbor = { path = "../../crates/cratestack-codec-cbor", version = "0.4.4" }
cratestack-codec-json = { path = "../../crates/cratestack-codec-json", version = "0.4.4" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }
tower = { workspace = true }
