[package]
name = "rpc-batch-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "RPC server demonstrating POST /rpc/batch: multiple ops in one round-trip, per-frame error isolation, request order preserved on the response."

[[bin]]
name = "rpc-batch-server"
path = "src/main.rs"

[dependencies]
cratestack = { path = "../../crates/cratestack", version = "0.3.2" }
cratestack-codec-cbor = { path = "../../crates/cratestack-codec-cbor", version = "0.3.2" }
cratestack-codec-json = { path = "../../crates/cratestack-codec-json", version = "0.3.2" }
serde = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tower = { workspace = true }
