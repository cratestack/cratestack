[package]
name = "rpc-batch-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "RPC server demonstrating POST /rpc/batch: multiple ops in one round-trip, per-frame error isolation, request order preserved on the response."

[[bin]]
name = "rpc-batch-server"
path = "src/main.rs"

[dependencies]
cratestack = { package = "cratestack-pg", path = "../../crates/cratestack-pg", version = "0.4.3" }
cratestack-codec-cbor = { path = "../../crates/cratestack-codec-cbor", version = "0.4.3" }
cratestack-codec-json = { path = "../../crates/cratestack-codec-json", version = "0.4.3" }
serde = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tower = { workspace = true }
