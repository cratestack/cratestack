[package]
name = "microservice-pair-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Service that is both a server (include_server_schema!) and a typed HTTP client of another service (include_client_schema!). Demonstrates the 'orders service that calls the catalog service' shape."

[[bin]]
name = "orders-service"
path = "src/main.rs"

[dependencies]
cratestack = { path = "../../crates/cratestack", version = "0.3.4" }
cratestack-client-rust = { path = "../../crates/cratestack-client-rust", version = "0.3.4" }
cratestack-codec-cbor = { path = "../../crates/cratestack-codec-cbor", version = "0.3.4" }
cratestack-codec-json = { path = "../../crates/cratestack-codec-json", version = "0.3.4" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
url = { workspace = true }
