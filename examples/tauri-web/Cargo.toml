[package]
name = "tauri-web-wasm-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Wasm cdylib loaded inside a Tauri 2 webview. include_embedded_schema! drives the local SQLite store (OPFS-backed) for the embedded side of the tauri-web example; the matching native Tauri shell lives at ./src-tauri and uses include_client_schema! to call remote CrateStack services from the trusted side."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
chrono = { workspace = true }
cratestack = { path = "../../crates/cratestack", version = "0.3.5" }
cratestack-macros = { path = "../../crates/cratestack-macros", version = "0.3.5" }
cratestack-rusqlite = { path = "../../crates/cratestack-rusqlite", version = "0.3.5" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
