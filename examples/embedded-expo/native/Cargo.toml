[package]
name = "embedded-expo-native"
version = "0.1.0"
edition = "2024"
publish = false
description = "Rust cdylib for the embedded-expo example. Exposes a single `cratestack_dispatch` C-ABI entry point that decodes a JSON OperationRequest, executes against the Note model via ModelDelegate, and returns a serialized OperationResponse. The Expo native module on iOS/Android calls this entry point and ferries bytes to/from JS."

[lib]
name = "embedded_expo_native"
crate-type = ["cdylib", "rlib", "staticlib"]

[lints.rust]
# The C ABI exports below intentionally hand raw pointers across the
# language boundary; that's the unsafe code's whole reason for existing.
# Lift the workspace-wide forbid.
unsafe_code = "allow"

[dependencies]
chrono = { workspace = true }
cratestack = { package = "cratestack-sqlite", path = "../../../crates/cratestack-sqlite", version = "0.4.2" }
cratestack-macros = { path = "../../../crates/cratestack-macros", version = "0.4.2" }
cratestack-rusqlite = { path = "../../../crates/cratestack-rusqlite", version = "0.4.2" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }

# JNI bindings for the Android path. iOS doesn't need this — Swift just
# `@_silgen_name`s the C ABI symbols below.
[target.'cfg(target_os = "android")'.dependencies]
jni = { version = "0.21", default-features = false }
