[package]
name = "react-vite-daisyui-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "React + Vite + Tailwind 4 + DaisyUI 5 SPA driving a cratestack-rusqlite ModelDelegate compiled to wasm32-unknown-unknown and persisted via OPFS."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
chrono = { workspace = true }
cratestack = { package = "cratestack-sqlite", path = "../../crates/cratestack-sqlite", version = "0.4.4" }
cratestack-macros = { path = "../../crates/cratestack-macros", version = "0.4.4" }
cratestack-rusqlite = { path = "../../crates/cratestack-rusqlite", version = "0.4.4" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
