[package]
name = "embedded-daemon-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Long-running Linux/macOS daemon: tokio + notify watches a directory, debounces filesystem events, and persists them through include_embedded_schema! + cratestack-rusqlite. Demonstrates the async-I/O-around-sync-ModelDelegate seam."

[[bin]]
name = "cratestack-daemon"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
# NOTE(0.3.x): the macro currently emits `::cratestack::*` paths for shared
# helpers (IntoSqlValue, FilterExpr, ...) so embedded consumers transitively
# pull in the facade.
cratestack = { package = "cratestack-sqlite", path = "../../crates/cratestack-sqlite", version = "0.4.3" }
cratestack-macros = { path = "../../crates/cratestack-macros", version = "0.4.3" }
cratestack-rusqlite = { path = "../../crates/cratestack-rusqlite", version = "0.4.3" }
notify = "8"
serde = { workspace = true }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { workspace = true }

[dev-dependencies]
tempfile = "3"
