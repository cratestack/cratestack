[package]
name = "tauri-native-shell-example"
version = "0.1.0"
edition = "2024"
publish = false
description = "Tauri 2 desktop shell hosting include_embedded_schema! AND include_client_schema! natively. Unlike tauri-web, there is no wasm in the webview — the renderer is a pure view layer that calls Tauri commands for every data operation, both local (SQLite via rusqlite) and remote (typed HTTP client). This is the canonical Phase C shape for a thick-client desktop app."

[lib]
name = "tauri_native_shell_example_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "tauri-native-shell"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.6", features = [] }

[dependencies]
chrono = { workspace = true }
cratestack = { path = "../../../crates/cratestack", version = "0.3.3" }
cratestack-client-rust = { path = "../../../crates/cratestack-client-rust", version = "0.3.3" }
cratestack-codec-cbor = { path = "../../../crates/cratestack-codec-cbor", version = "0.3.3" }
cratestack-macros = { path = "../../../crates/cratestack-macros", version = "0.3.3" }
cratestack-rusqlite = { path = "../../../crates/cratestack-rusqlite", version = "0.3.3" }
serde = { workspace = true }
serde_json = { workspace = true }
tauri = { version = "2.11", features = [] }
tokio = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
