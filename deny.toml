[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Zlib",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Apache-2.0 WITH LLVM-exception"
]

[advisories]
ignore = []

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
